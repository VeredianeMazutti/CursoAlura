<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="catalogo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar" id="navbar">
        <div class="navbar-left">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Séries</a></li>
                    <li><a href="#">Filmes</a></li>
                    <li><a href="#">Jogos</a></li>
                    <li><a href="#">Bombando</a></li>
                    <li><a href="#">Minha lista</a></li>
                    <li><a href="#">Melhores da Alura</a></li>
                </ul>
            </nav>
        </div>

        <div class="navbar-right">
            <i class="fas fa-search icon"></i>
            <a href="../../../index.html" class="kids-link" id="perfil-nome">Seu nome</a>
            <div class="nav-notification">
                <i class="fas fa-bell icon"></i>
                <span class="notification-badge">42</span>
            </div>
            <a href="../../../index.html" class="profile-menu">
                <img class="profile-icon" id="perfil-img" src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Profile">
                <i class="fas fa-caret-down icon" style="font-size: 14px; margin-left: 5px;"></i>
            </a>
        </div>
    </header>

    <main class="sliders-container" id="main-content"></main>

    <footer>
        <div class="footer-content">
            <p>Imersão Alura AI</p>
        </div>
    </footer>

    <script type="module" src="../js/main.js"></script>

    <script>
        const perfil = JSON.parse(localStorage.getItem('activeProfile'));
        if (perfil) {
            const nomeEl = document.getElementById('perfil-nome');
            const imgEl = document.getElementById('perfil-img');
            if (nomeEl) nomeEl.textContent = perfil.name;
            if (imgEl) {
                imgEl.src = perfil.img;
                imgEl.alt = perfil.name;
            }
        }
    </script>
</body>

</html>
