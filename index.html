<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="theme-toggle.js"></script>
</head>

<body>
    <button id="theme-toggle" aria-label="Alternar tema" style="position: absolute; top: 1rem; right: 1rem; z-index: 10; background: none; border: none; cursor: pointer; font-size: 1.5rem; color: inherit;">
        🌙
    </button>

    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section class="profiles">
            <ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 2.5rem;">
                <li>
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html"
                        onclick="setActiveProfile('Nexus', '../../../assets/Perfil1.jpg')">
                        <figure class="profile">
                            <img src="assets/Perfil1.jpg" alt="Nexus">
                            <figcaption>Nexus</figcaption>
                        </figure>
                    </a>
                </li>

                <li>
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html"
                        onclick="setActiveProfile('Cypher', '../../../assets/Perfil2.jpg')">
                        <figure class="profile">
                            <img src="assets/Perfil2.jpg" alt="Cypher">
                            <figcaption>Cypher</figcaption>
                        </figure>
                    </a>
                </li>

                <li>
                    <a href="netflix-plataform-main/netflix-plataform-main/catalogo/catalogo.html"
                        onclick="setActiveProfile('Zion', '../../../assets/Perfil3.jpg')">
                        <figure class="profile">
                            <img src="assets/Perfil3.jpg" alt="Zion">
                            <figcaption>Zion</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
